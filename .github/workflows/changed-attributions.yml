name: "Sync and notify on changed attributions"

on:
  push:
    branches: [ master ]
    paths:
      - '_data/ow_attributions.json'

jobs:
  slackNotification:
    name: Slack Notification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: 'Donation Alert'
          SLACK_ICON_EMOJI: ':money_with_wings:'
          SLACK_FOOTER: ''
          MSG_MINIMAL: commit,actions url

  UpdateAttributionsOnWebsite:
    if: github.repository == 'OWASP/www-project-juice-shop'
    runs-on: ubuntu-latest
    steps:
    - name: Check out Git repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      with:
        token: ${{ secrets.BOT_TOKEN }}
        repository: juice-shop/juice-shop.github.io
        ref: master
    - name: Update ow_attributions.json
      run: |
        cd _data
        rm ow_attributions.json
        wget https://raw.githubusercontent.com/OWASP/www-project-juice-shop/${{ github.ref_name }}/_data/ow_attributions.json
    - uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842 #v5.0.1
      with:
        commit_message: "Auto-update ow_attributions.json from ${{ github.sha }}"
        branch: master
        commit_options: '--signoff'

        # Optional commit user and author settings
        commit_user_name: JuiceShopBot
        commit_user_email: 61591748+JuiceShopBot@users.noreply.github.com
        commit_author: JuiceShopBot <61591748+JuiceShopBot@users.noreply.github.com>
